<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KTM Komuter Crowd Pulse</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; margin:0; padding:16px; background:#fff;}
    .card{max-width:980px;margin:0 auto;border:1px solid #eee;border-radius:14px;padding:14px;}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
    select{padding:10px;border-radius:10px;border:1px solid #ddd;min-width:220px;}
    #meta{color:#666;font-size:12px;margin-top:6px}
    #picks{margin-top:10px;font-size:14px}
    canvas{width:100%;height:140px;margin-top:12px;border-radius:12px;border:1px solid #f0f0f0;}
    .legend{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:#666;margin-top:6px}
  </style>
</head>
<body>
  <div class="card">
    <div class="row">
      <select id="origin"></select>
      <select id="destination" disabled></select>
    </div>

    <div id="meta">Loading data…</div>
    <div id="live" style="color:#666;font-size:12px;margin-top:6px"></div>


    <canvas id="heatmap" width="960" height="180"></canvas>

    <div class="legend">
      <span>Low (likely seats)</span>
      <span>Medium (mixed)</span>
      <span>High (standing likely)</span>
      <span>Very High (packed)</span>
    </div>

    <div id="picks"></div>
  </div>

 <script src="./app.js"></script>

</body>
</html>
