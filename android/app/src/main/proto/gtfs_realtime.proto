syntax = "proto3";

package transit_realtime;

option java_package = "com.google.transit.realtime";
option java_multiple_files = true;

// Simplified GTFS-realtime schema for vehicle positions.
// Full spec: https://gtfs.org/documentation/realtime/reference/

message FeedMessage {
    FeedHeader header = 1;
    repeated FeedEntity entity = 2;
}

message FeedHeader {
    string gtfs_realtime_version = 1;
    uint64 timestamp = 2;
}

message FeedEntity {
    string id = 1;
    VehiclePosition vehicle = 8;
}

message VehiclePosition {
    string vehicle_id = 3;
    Position position = 1;
    uint64 timestamp = 4;
}

message Position {
    float latitude = 1;
    float longitude = 2;
    float bearing = 3;
    float speed = 5;
}
